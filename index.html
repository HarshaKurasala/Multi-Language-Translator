<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSpeakAI - Instant AI Translation Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fas fa-language"></i>
                <h1>WorldSpeak<span>AI</span></h1>
            </div>
            <p>Experience seamless translation with our advanced AI engine.</p>
        </header>

        <!-- Main Translator -->
        <main class="translator-card">
            <!-- Language Selection -->
            <div class="language-bar">
                <div class="lang-select-wrapper">
                    <select id="sourceLanguage">
                        <option value="auto">Auto-Detect</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese (Simplified)</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                        <option value="ko">Korean</option>
                        <option value="bn">Bengali</option>
                        <option value="te">Telugu</option>
                        <option value="mr">Marathi</option>
                        <option value="ta">Tamil</option>
                        <option value="gu">Gujarati</option>
                        <option value="th">Thai</option>
                        <option value="tr">Turkish</option>
                    </select>
                </div>

                <button class="swap-languages" id="swapBtn" title="Swap Languages">
                    <i class="fas fa-exchange-alt"></i>
                </button>

                <div class="lang-select-wrapper">
                    <select id="targetLanguage">
                        <option value="es">Spanish</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese (Simplified)</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                        <option value="ko">Korean</option>
                        <option value="bn">Bengali</option>
                        <option value="te">Telugu</option>
                        <option value="mr">Marathi</option>
                        <option value="ta">Tamil</option>
                        <option value="gu">Gujarati</option>
                        <option value="th">Thai</option>
                        <option value="tr">Turkish</option>
                    </select>
                </div>
            </div>

            <!-- Content Area -->
            <div class="translator-content">
                <!-- Input Section -->
                <div class="text-area-group input-area">
                    <div class="area-header">
                        <span>Input</span>
                        <span class="char-count"><span id="inputCount">0</span> / 5000</span>
                    </div>
                    <textarea 
                        id="inputText" 
                        placeholder="Type to translate..."
                        maxlength="5000"></textarea>
                    <div class="area-actions">
                        <button class="action-btn" id="voiceInputBtn" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="action-btn" id="listenInputBtn" title="Listen" disabled>
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <button class="action-btn" id="clearInputBtn" title="Clear">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- Output Section -->
                <div class="text-area-group output-area">
                    <div class="area-header">
                        <span>Translation</span>
                        <span class="char-count"><span id="outputCount">0</span> / 5000</span>
                    </div>
                    <textarea 
                        id="outputText" 
                        placeholder="Translation will appear here..."
                        readonly></textarea>
                    <div class="area-actions">
                        <button class="action-btn" id="listenBtn" title="Listen" disabled>
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <button class="action-btn" id="copyBtn" title="Copy" disabled>
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="action-btn" id="clearOutputBtn" title="Clear" disabled>
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer Controls -->
            <div class="translator-footer">
                <div id="status" class="status-indicator"></div>
                <button class="main-translate-btn" id="translateBtn">
                    <span>Translate</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </main>

        <!-- Features -->
        <section class="quick-features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                <div class="feature-text">
                    <h4>Fast & Accurate</h4>
                    <p>Real-time AI processing</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-globe"></i></div>
                <div class="feature-text">
                    <h4>Multi-Language</h4>
                    <p>16+ major languages</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-microphone"></i></div>
                <div class="feature-text">
                    <h4>Voice Support</h4>
                    <p>Text-to-speech engine</p>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 LinguoAI. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
